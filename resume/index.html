    <style>
      :root {
        --text: #e6e6e6;
        --muted: #9aa0a6;
        --link: #8ab4f8;
        --border: #2a2f3a;
        --bg: #0f1115;
        --bg-subtle: #12161c;
      }
      html { color-scheme: dark; }
      html, body {
        background: var(--bg) !important;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        line-height: 1.5;
        min-height: 100%;
      }
      body:before, #banner:before { display: none !important; background: none !important; }
      #page-wrapper {
        background: none !important;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #header, #footer, .wrapper, header.alt {
        background: transparent !important;
        box-shadow: none !important;
      }
      #header {
        display: block !important;
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.5rem;
      }
      #header h1 {
        margin: 0;
        font-size: 1.25rem;
      }
      #header h1 a {
        color: var(--text);
        text-decoration: none;
      }
      #nav #menu {
        background: var(--bg-subtle);
        border: 1px solid var(--border);
      }
      .resume-page {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 1rem 1rem 2rem;
        box-sizing: border-box;
      }
      .resume-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
      }
      .resume-toolbar h2 {
        margin: 0;
        font-size: 1.1rem;
      }
      .resume-toolbar a {
        color: var(--link);
        text-decoration: none;
        border-bottom: 1px dotted var(--link);
      }
      .resume-toolbar a:hover {
        border-bottom-style: solid;
      }
      .resume-viewer {
        flex: 1;
        min-height: 0;
      }
      .resume-viewer iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 220px);
        min-height: 520px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: #fff;
      }
      #footer ul.icons {
        gap: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        font-size: 0.95rem;
      }
      #footer .icons a { color: var(--muted); text-decoration: none; }
      #footer .icons a:hover { color: var(--link); }
      #footer {
        border-top: 1px solid var(--border);
        padding: 1rem 1rem 1.5rem;
        text-align: center;
        margin-top: auto;
      }
      @media (max-width: 736px) {
        .resume-viewer iframe {
          height: calc(100vh - 260px);
          min-height: 420px;
        }
      }
    </style>
